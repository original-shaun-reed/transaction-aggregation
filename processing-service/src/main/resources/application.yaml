spring:
  application:
    name: processing-service
  profiles:
    active: dev

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ── PostgreSQL ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_aggregation}
    username: ${DB_USER:transaction_aggregation}
    password: ${DB_PASSWORD:transaction_aggregation_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema — JPA never modifies it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
      repository:
        base-packages: za.co.reed.persistence.repository
      entity:
        base-packages: za.co.reed.persistence.entity

  # ── Flyway ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Kafka consumer ──────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: processing-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: za.co.reed.common
        max.poll.records: 100
        max.poll.interval.ms: 300000

    # Kafka producer (for categorised-transactions + DLQ)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

server:
  port: 8083

# ── Categorisation ─────────────────────────────────────────────
categorisation:
  rules-engine:
    enabled: true
  ml-classifier:
    enabled: false # enable when model endpoint is available
    endpoint: ${ML_CLASSIFIER_URL:http://localhost:8099/classify}
    timeout-ms: 500
    fallback-category: uncategorised

# ── Retry + DLQ ───────────────────────────────────────────────
retry:
  max-attempts: 3
  backoff-ms: 1000

# ── Cache (for RulesEngine MCC/keyword lookups) ───────────────
spring.cache:
  type: simple # in-memory ConcurrentHashMap — upgrade to Redis if needed

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    za.co.reed.processingservice: DEBUG
    org.hibernate.SQL: WARN
    org.apache.kafka: WARN
