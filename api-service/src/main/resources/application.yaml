spring:
  application:
    name: api-service
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_aggregation}
    username: ${DB_USER:transaction_aggregation}
    password: ${DB_PASSWORD:transaction_aggregation_secret}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      read-only: false # keep false for local dev
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update # or validate/create-drop depending on your needs
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true # optional, logs SQL for debugging

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5


server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

# ── Security ───────────────────────────────────────────────────
security:
  jwt:
    secret: dev-jwt-secret-min-256-bits-change-in-prod
    expiry-minutes: 60

# ── Rate limiting ──────────────────────────────────────────────
rate-limit:
  capacity: 100
  refill-tokens: 100
  refill-period-seconds: 60

# ── Cache TTLs (seconds) ───────────────────────────────────────
cache:
  ttl:
    summary: 300
    compare: 300
    time-series: 300
    top-merchants: 120
    categories: 3600

# ── Pagination ─────────────────────────────────────────────────
pagination:
  default-page-size: 20
  max-page-size: 100

# ── Async thread pool ──────────────────────────────────────────
async:
  core-pool-size: 4
  max-pool-size: 20
  queue-capacity: 50

# ── Springdoc / Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
