# ── prod profile ──────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
    import:
      - "aws-parameterstore:/transation_aggregator/prod/ingestor/"
      - "aws-secretsmanager:transation_aggregator/prod/ingestor-secrets"
  kafka:
    bootstrap-servers: ${/transation_aggregator/prod/ingestor/kafka-bootstrap-servers}
    producer:
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: AWS_MSK_IAM
        sasl.jaas.config: software.amazon.msk.auth.iam.IAMLoginModule required;
        sasl.client.callback.handler.class: software.amazon.msk.auth.iam.IAMClientCallbackHandler
  data:
    redis:
      host: ${/transation_aggregator/prod/ingestor/redis-host}
      password: ${redis-password}

webhook:
  secret: ${webhook-secret}

kafka:
  replication-factor: 3

logging:
  level:
    root: WARN
    za.co.reed.ingestorservice: INFO
